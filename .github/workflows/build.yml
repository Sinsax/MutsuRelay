name: Build

on:
  push:
    branches: [main, master, test]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install Linux deps (for cargo check)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev libasound2-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Cargo check (Linux)
        working-directory: native
        run: cargo check

