  build-linux:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev \
            libgtk-3-dev \
            libasound2-dev \
            liblz4-dev \
            pkg-config \
            libayatana-appindicator3-dev \
            fuse locate

      - name: Cache ASR model
        uses: actions/cache@v4
        with:
          path: asr/model
          key: asr-model-${{ hashFiles('cmake/download_model.cmake') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Install appimagetool
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build Flutter Linux (release)
        run: flutter build linux --release

      - name: Create AppImage
        run: dart run fastforge:main package --platform linux --targets appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          LD_LIBRARY_PATH: build/linux/x64/release/bundle/lib

      - uses: actions/upload-artifact@v4
        with:
          name: mutsurelay-linux-x64
          path: build/linux/x64/release/bundle/
          compression-level: 6

      - uses: actions/upload-artifact@v4
        with:
          name: mutsurelay-linux-x64-appimage
          path: "*.AppImage"
          compression-level: 0
